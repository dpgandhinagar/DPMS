<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Progress Updates | DPMS</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/dashboard.css">

    <link rel="stylesheet" href="../css/progress-updates.css">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <div id="sidebar-container"></div>

    <!-- Main -->

    <div class="main-content">

        <!-- Navbar -->

        <div id="navbar-container"></div>

        <div class="container-fluid p-4">

            <!-- Header -->

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="fw-bold">

                        Progress Updates

                    </h2>

                    <p class="text-muted">

                        Monitor Activity Progress

                    </p>

                </div>

                <button
                    class="btn btn-primary"
                    id="btnAddProgress">

                    <i class="bi bi-plus-circle"></i>

                    Add Progress

                </button>

            </div>

            <!-- Activity Details -->

            <div class="card mb-4">

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-4">

                            <strong>Activity</strong>

                            <div id="activityTitle">

                                -

                            </div>

                        </div>

                        <div class="col-md-2">

                            <strong>Priority</strong>

                            <div id="activityPriority">

                                -

                            </div>

                        </div>

                        <div class="col-md-3">

                            <strong>Officer</strong>

                            <div id="activityOfficer">

                                -

                            </div>

                        </div>

                        <div class="col-md-3">

                            <strong>Target Date</strong>

                            <div id="activityDate">

                                -

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Progress History -->

            <div class="card">

                <div class="table-responsive">

                    <table class="table table-hover align-middle mb-0">

                        <thead class="table-light">

                        <tr>

                            <th>#</th>

                            <th>Date</th>

                            <th>Progress</th>

                            <th>Remarks</th>

                            <th>Updated By</th>

                        </tr>

                        </thead>

                        <tbody id="progressTableBody">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Progress Modal -->

<div
    class="modal fade"
    id="progressModal"
    tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <form id="progressForm">

                <div class="modal-header">

                    <h5>

                        Add Progress Update

                    </h5>

                    <button
                        class="btn-close"
                        data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body">

                    <input
                        type="hidden"
                        id="progressId">

                    <div class="mb-3">

                        <label>

                            Progress %

                        </label>

                        <input
                            type="number"
                            id="progress"
                            min="0"
                            max="100"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>

                            Remarks

                        </label>

                        <textarea
                            id="remarks"
                            rows="5"
                            class="form-control"
                            required></textarea>

                    </div>

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal"
                        type="button">

                        Cancel

                    </button>

                    <button
                        class="btn btn-success">

                        Save

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<script
type="module"
src="../js/progress-updates.js">
</script>

</body>

</html>
