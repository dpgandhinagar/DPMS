<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link href="css/style.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">

District Planning &
Monitoring System

</h3>

<form id="loginForm">

<div class="mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
id="password"
class="form-control"
required>

</div>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

<div
id="error"
class="text-danger mt-3">

</div>

</div>

</div>

</div>

</div>

</div>

<script type="module">

import { login } from "./js/auth.js";

const form=document.getElementById("loginForm");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

try{

await login(

email.value,

password.value

);

window.location = "pages/dashboard.html";

}catch(err){

error.innerText=err.message;

}

});

</script>

</body>

</html>
