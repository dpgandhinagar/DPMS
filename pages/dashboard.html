<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DPMS Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="../css/style.css" rel="stylesheet">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <div id="sidebar-container"></div>

    <!-- Main Content -->

    <div class="main-content">

        <!-- Navbar -->

        <div id="navbar-container"></div>

        <!-- Page -->

        <div class="page-content">

            <div class="page-toolbar">

                <h2 class="page-title mb-0">

                    Dashboard

                </h2>

            </div>

            <!-- ================= KPI ROW 1 ================= -->

            <div class="row g-4">

                <div class="col-xl-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="card-body">

                            <div class="dashboard-card-header">

                                <div>

                                    <div class="dashboard-label">

                                        Departments

                                    </div>

                                    <div class="dashboard-number"

                                        id="departmentCount">

                                        0

                                    </div>

                                </div>

                                <div class="dashboard-icon icon-blue">

                                    <i class="bi bi-building"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-xl-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="card-body">

                            <div class="dashboard-card-header">

                                <div>

                                    <div class="dashboard-label">

                                        Weekly Plans

                                    </div>

                                    <div class="dashboard-number"

                                        id="planCount">

                                        0

                                    </div>

                                </div>

                                <div class="dashboard-icon icon-purple">

                                    <i class="bi bi-calendar-check"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-xl-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="card-body">

                            <div class="dashboard-card-header">

                                <div>

                                    <div class="dashboard-label">

                                        Action Items

                                    </div>

                                    <div class="dashboard-number"

                                        id="activityCount">

                                        0

                                    </div>

                                </div>

                                <div class="dashboard-icon icon-orange">

                                    <i class="bi bi-list-check"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-xl-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="card-body">

                            <div class="dashboard-card-header">

                                <div>

                                    <div class="dashboard-label">

                                        Overall Progress

                                    </div>

                                    <div class="dashboard-number"

                                        id="completionPercent">

                                        0%

                                    </div>

                                </div>

                                <div class="dashboard-icon icon-green">

                                    <i class="bi bi-graph-up-arrow"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- ================= KPI ROW 2 ================= -->

            <div class="row g-4 mt-1">

                <div class="col-xl-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="card-body">

                            <div class="dashboard-card-header">

                                <div>

                                    <div class="dashboard-label">

                                        Submitted Plans

                                    </div>

                                    <div class="dashboard-number"

                                        id="submittedPlans">

                                        0

                                    </div>

                                </div>

                                <div class="dashboard-icon icon-cyan">

                                    <i class="bi bi-send-check"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-xl-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="card-body">

                            <div class="dashboard-card-header">

                                <div>

                                    <div class="dashboard-label">

                                        In Progress

                                    </div>

                                    <div class="dashboard-number"

                                        id="inProgressCount">

                                        0

                                    </div>

                                </div>

                                <div class="dashboard-icon icon-orange">

                                    <i class="bi bi-hourglass-split"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-xl-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="card-body">

                            <div class="dashboard-card-header">

                                <div>

                                    <div class="dashboard-label">

                                        Completed

                                    </div>

                                    <div class="dashboard-number"

                                        id="completedCount">

                                        0

                                    </div>

                                </div>

                                <div class="dashboard-icon icon-green">

                                    <i class="bi bi-check-circle"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-xl-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="card-body">

                            <div class="dashboard-card-header">

                                <div>

                                    <div class="dashboard-label">

                                        Delayed

                                    </div>

                                    <div class="dashboard-number"

                                        id="delayedCount">

                                        0

                                    </div>

                                </div>

                                <div class="dashboard-icon icon-red">

                                    <i class="bi bi-exclamation-triangle"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- ================= MAIN DASHBOARD STARTS HERE ================= -->

                        <div class="row mt-4">

                <!-- LEFT COLUMN -->

                <div class="col-lg-5">

                    <!-- District Activity Feed -->

                    <div class="dashboard-panel mb-4">

                        <div class="dashboard-panel-header">

                            <h5>

                                <i class="bi bi-clock-history me-2"></i>

                                District Activity Feed

                            </h5>

                        </div>

                        <div id="activityFeed" class="p-3">

                            <div class="text-muted">

                                No recent activity.

                            </div>

                        </div>

                    </div>

                    <!-- Executive Alerts -->

                    <div class="dashboard-panel">

                        <div class="dashboard-panel-header">

                            <h5>

                                <i class="bi bi-exclamation-triangle-fill text-warning me-2"></i>

                                Executive Alerts

                            </h5>

                        </div>

                        <div id="executiveAlerts" class="p-3">

                            <div class="text-muted">

                                Loading alerts...

                            </div>

                        </div>

                    </div>

                </div>

                <!-- RIGHT COLUMN -->

                <div class="col-lg-7">

                    <div class="dashboard-panel h-100">

                        <div class="dashboard-panel-header">

                            <div class="d-flex justify-content-between align-items-center w-100">

                                <h5 class="mb-0">

                                    <i class="bi bi-bar-chart-fill me-2"></i>

                                    Department Performance

                                </h5>

                                <small class="text-muted">

                                    Completion %

                                </small>

                            </div>

                        </div>

                        <div id="departmentPerformance" class="p-3">

                            <div class="text-muted">

                                Loading department performance...

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script type="module" src="../js/dashboard.js"></script>

</body>

</html>
