<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Action Items | DPMS</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/dashboard.css">

    <link rel="stylesheet" href="../css/action-items.css">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <div id="sidebar-container"></div>

    <!-- Main -->

    <div class="main-content">

        <!-- Navbar -->

        <div id="navbar-container"></div>

        <div class="container-fluid p-4">

            <!-- Page Header -->

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="fw-bold">

                        Action Items

                    </h2>

                    <p class="text-muted mb-0">

                        Weekly Plan Activities

                    </p>

                </div>

                <button
                    class="btn btn-primary"
                    id="btnAddItem">

                    <i class="bi bi-plus-circle"></i>

                    Add Action Item

                </button>

            </div>

            <!-- Weekly Plan Details -->

            <div class="card mb-4">

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-3">

                            <strong>Department</strong>

                            <div id="planDepartment">

                                -

                            </div>

                        </div>

                        <div class="col-md-2">

                            <strong>Week</strong>

                            <div id="planWeek">

                                -

                            </div>

                        </div>

                        <div class="col-md-2">

                            <strong>Year</strong>

                            <div id="planYear">

                                -

                            </div>

                        </div>

                        <div class="col-md-5">

                            <strong>Plan Title</strong>

                            <div id="planTitle">

                                -

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Table -->

            <div class="card">

                <div class="table-responsive">

                    <table class="table table-hover align-middle mb-0">

                        <thead class="table-light">

                        <tr>

                            <th>#</th>

                            <th>Activity</th>

                            <th>Priority</th>

                            <th>Officer</th>

                            <th>Target Date</th>

                            <th class="text-center" style="width:150px;">
    Progress
</th>

                            <th>Status</th>

                            <th class="text-center" style="width:180px;">

    Action

</th>

                        </tr>

                        </thead>

                        <tbody id="itemsTableBody">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Modal -->

<div
    class="modal fade"
    id="itemModal"
    tabindex="-1">

    <div class="modal-dialog modal-xl">

        <div class="modal-content">

            <form id="itemForm">

                <div class="modal-header">

                    <h5>

                        Action Item

                    </h5>

                    <button
                        class="btn-close"
                        data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body">

                    <input
                        type="hidden"
                        id="itemId">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>

                                Activity Title

                            </label>

                            <input
                                id="activityTitle"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>

                                Responsible Officer

                            </label>

                            <input
                                id="responsibleOfficer"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label>

                            Activity Description

                        </label>

                        <textarea
                            id="activityDescription"
                            rows="4"
                            class="form-control"></textarea>

                    </div>

                    <div class="row">

                        <div class="col-md-3 mb-3">

                            <label>

                                Priority

                            </label>

                            <select
                                id="priority"
                                class="form-select">

                                <option>High</option>

                                <option>Medium</option>

                                <option>Low</option>

                            </select>

                        </div>

                        <div class="col-md-3 mb-3">

                            <label>

                                Target Date

                            </label>

                            <input
                                type="date"
                                id="targetDate"
                                class="form-control">

                        </div>

                        <div class="col-md-3 mb-3">

                            <label>

                                Progress %

                            </label>

                            <input
                                type="number"
                                id="progress"
                                min="0"
                                max="100"
                                class="form-control">

                        </div>

                        <div class="col-md-3 mb-3">

                            <label>

                                Status

                            </label>

                            <select
                                id="status"
                                class="form-select">

                                <option>Planned</option>

                                

                                <option>Completed</option>

                                <option>Cancelled</option>

                            </select>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label>

                            Remarks

                        </label>

                        <textarea
                            id="remarks"
                            rows="3"
                            class="form-control"></textarea>

                    </div>

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Cancel

                    </button>

                    <button
                        class="btn btn-success">

                        Save

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<script
    type="module"
    src="../js/action-items.js">
</script>

</body>

</html>
