<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DPMS Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/dashboard.css" rel="stylesheet">

</head>

<body>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Navbar -->
        <div id="navbar-container"></div>

        <div class="container-fluid p-4">

            <h2 class="fw-bold mb-4">
                Dashboard
            </h2>

            <!-- Top Cards -->

            <div class="row g-4">

                <div class="col-lg-3 col-md-6">

                    <div class="dashboard-card">

                        <div>

                            <small>Departments</small>

                            <h2 id="departmentCount">0</h2>

                        </div>

                        <i class="bi bi-building dashboard-icon"></i>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="dashboard-card">

                        <div>

                            <small>Weekly Plans</small>

                            <h2 id="planCount">0</h2>

                        </div>

                        <i class="bi bi-calendar-check dashboard-icon"></i>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="dashboard-card">

                        <div>

                            <small>Action Items</small>

                            <h2 id="activityCount">0</h2>

                        </div>

                        <i class="bi bi-list-check dashboard-icon"></i>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="dashboard-card">

                        <div>

                            <small>Completion</small>

                            <h2 id="completionPercent">0%</h2>

                        </div>

                        <i class="bi bi-graph-up-arrow dashboard-icon"></i>

                    </div>

                </div>

            </div>

            <!-- Second Row -->

            <!-- KPI Row 2 -->

<div class="row g-4 mt-1">

    <div class="col-lg-3 col-md-6">

        <div class="dashboard-card">

            <div>

                <small>Submitted Plans</small>

                <h2 id="submittedPlans">0</h2>

            </div>

            <i class="bi bi-send-check dashboard-icon"></i>

        </div>

    </div>

    <div class="col-lg-3 col-md-6">

        <div class="dashboard-card">

            <div>

                <small>In Progress</small>

                <h2 id="inProgressCount">0</h2>

            </div>

            <i class="bi bi-hourglass-split dashboard-icon"></i>

        </div>

    </div>

    <div class="col-lg-3 col-md-6">

        <div class="dashboard-card">

            <div>

                <small>Completed</small>

                <h2 id="completedCount">0</h2>

            </div>

            <i class="bi bi-check-circle dashboard-icon"></i>

        </div>

    </div>

    <div class="col-lg-3 col-md-6">

        <div class="dashboard-card">

            <div>

                <small>Delayed</small>

                <h2 id="delayedCount">0</h2>

            </div>

            <i class="bi bi-exclamation-triangle dashboard-icon"></i>

        </div>

    </div>

</div>

            <div class="row mt-4">

                <div class="col-lg-8">

                    <div class="card shadow-sm">

                        <div class="card-header">

                            <strong>Recent Updates</strong>

                        </div>

                        <div class="card-body">

                            <div id="recentUpdates">

                                No updates available.

                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-lg-4">

                    <div class="card shadow-sm">

                        <div class="card-header">

                            <strong>System Information</strong>

                        </div>

                        <div class="card-body">

                            <p><strong>District :</strong> Gandhinagar</p>

                            <p><strong>Version :</strong> 1.0</p>

                            <p><strong>Status :</strong>
                                <span class="badge bg-success">
                                    Online
                                </span>
                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script type="module" src="../js/dashboard.js"></script>

</body>

</html>
