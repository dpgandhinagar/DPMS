<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attachments | DPMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/dashboard.css" rel="stylesheet">
    <link href="../css/attachments.css" rel="stylesheet">

</head>

<body>

<div class="wrapper">

    <div id="sidebar-container"></div>

    <div class="main-content">

        <div id="navbar-container"></div>

        <div class="container-fluid p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="fw-bold">

                        Attachments

                    </h2>

                    <p class="text-muted">

                        Upload and manage supporting documents

                    </p>

                </div>

                <button
                    class="btn btn-primary"
                    id="btnUpload">

                    <i class="bi bi-upload"></i>

                    Upload File

                </button>

            </div>

            <!-- Parent Information -->

            <div class="card mb-4">

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-6">

                            <strong>Module</strong>

                            <div id="parentModule">

                                -

                            </div>

                        </div>

                        <div class="col-md-6">

                            <strong>Title</strong>

                            <div id="parentTitle">

                                -

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Files -->

            <div class="card">

                <div class="table-responsive">

                    <table class="table table-hover align-middle mb-0">

                        <thead class="table-light">

                        <tr>

                            <th>#</th>

                            <th>File Name</th>

                            <th>Type</th>

                            <th>Size</th>

                            <th>Uploaded</th>

                            <th width="180">

                                Action

                            </th>

                        </tr>

                        </thead>

                        <tbody id="attachmentTable">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Upload Modal -->

<div
class="modal fade"
id="uploadModal"
tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<form id="uploadForm">

<div class="modal-header">

<h5>

Upload Attachment

</h5>

<button
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<div class="mb-3">

<label>

Attachment Type

</label>

<select
id="attachmentType"
class="form-select">

<option value="planning">

Planning Document

</option>

<option value="progress">

Progress Report

</option>

<option value="photo">

Activity Photo

</option>

</select>

</div>

<div class="mb-3">

<label>

Choose File

</label>

<input
type="file"
id="attachmentFile"
class="form-control"
required>

</div>

</div>

<div class="modal-footer">

<button
type="button"
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancel

</button>

<button
class="btn btn-success">

Upload

</button>

</div>

</form>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module"
src="../js/attachments.js"></script>

</body>

</html>
