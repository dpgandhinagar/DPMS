<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>User Management | DPMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link href="../css/style.css"
          rel="stylesheet">

    <link href="../css/dashboard.css"
          rel="stylesheet">

    <link href="../css/users.css"
          rel="stylesheet">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <div id="sidebar-container"></div>

    <!-- Main -->

    <div class="main-content">

        <!-- Navbar -->

        <div id="navbar-container"></div>

        <div class="container-fluid p-4">

            <!-- Page Header -->

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="fw-bold">

                        User Management

                    </h2>

                    <p class="text-muted mb-0">

                        Manage DPMS Users

                    </p>

                </div>

                <button
                        id="btnAddUser"
                        class="btn btn-primary">

                    <i class="bi bi-person-plus"></i>

                    Add User

                </button>

            </div>

            <!-- Search -->

            <div class="card mb-4">

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-6">

                            <input
                                    type="text"
                                    id="searchUser"
                                    class="form-control"
                                    placeholder="Search by name or email">

                        </div>

                    </div>

                </div>

            </div>

            <!-- Users Table -->

            <div class="card">

                <div class="table-responsive">

                    <table
                            class="table table-hover align-middle mb-0">

                        <thead class="table-light">

                        <tr>

                            <th width="70">

                                Sr.

                            </th>

                            <th>

                                Full Name

                            </th>

                            <th>

                                Email

                            </th>

                            <th>

                                Role

                            </th>

                            <th>

                                Department

                            </th>

                            <th width="120">

                                Status

                            </th>

                            <th width="140">

                                Action

                            </th>

                        </tr>

                        </thead>

                        <tbody id="usersTableBody">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ===================================================== -->

<!-- USER MODAL -->

<!-- ===================================================== -->

<div
        class="modal fade"
        id="userModal"
        tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <form id="userForm">

                <div class="modal-header">

                    <h5 class="modal-title">

                        User Details

                    </h5>

                    <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body">

                    <input
                            type="hidden"
                            id="userId">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input
                                    type="text"
                                    id="fullName"
                                    class="form-control"
                                    required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Email

                            </label>

                            <input
                                    type="email"
                                    id="email"
                                    class="form-control"
                                    required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Role

                            </label>

                            <select
                                    id="role"
                                    class="form-select">

                                <option value="SUPER_ADMIN">

                                    SUPER_ADMIN

                                </option>

                                <option value="DDO">

                                    DDO

                                </option>

                                <option value="HOD">

                                    HOD

                                </option>

                                <option value="OPERATOR">

                                    OPERATOR

                                </option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Department

                            </label>

                            <select
                                    id="department"
                                    class="form-select">

                            </select>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <label class="form-label">

                                Status

                            </label>

                            <select
                                    id="isActive"
                                    class="form-select">

                                <option value="true">

                                    Active

                                </option>

                                <option value="false">

                                    Inactive

                                </option>

                            </select>

                        </div>

                    </div>

                </div>

                <div class="modal-footer">

                    <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">

                        Cancel

                    </button>

                    <button
                            class="btn btn-success">

                        Save User

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module"
        src="../js/users.js"></script>

</body>

</html>
